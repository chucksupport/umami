services:
  - type: web
    name: umami
    runtime: node
    region: oregon
    plan: basic-256mb
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/heartbeat
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: umami-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true

databases:
  - name: umami-db
    databaseName: umami
    user: umami
    region: oregon
    plan: basic-256mb
